name: Generate Contribution Snake

# Generates the contribution-graph "snake" SVGs and pushes them to the `output`
# branch, where the README's <picture> tags reference them.
# Docs: https://github.com/Platane/snk

on:
  schedule:
    # Re-generate every day at 00:30 UTC
    - cron: "30 0 * * *"
  # Generate immediately on pushes to main (so it appears right away)
  push:
    branches:
      - main
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=#7c3aed&color_dots=#0b1120,#1e3a8a,#3b82f6,#60a5fa,#93c5fd

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
